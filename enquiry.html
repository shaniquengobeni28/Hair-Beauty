<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Enquiry | NEY'S Hair & Beauty</title>
    <link rel="icon" type="image/jpeg" href="assets/images/logo.jpeg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">✨ NEY'S HAIR & BEAUTY</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="enquiry.html">Enquiries</a></li>
        </ul>
    </nav>
</header>

<hr>

<main>
    <section class="online-enquiry">
        <h2>Online Enquiry</h2>
        <form>
            <label for="u_name">Name</label>
            <input type="text" id="u_name" name="u_name" required>

            <label for="u_service">Service Needed</label>
            <select id="u_service" name="u_service">
                <option>Frontal Install</option>
                <option>Wig treatment</option>
                <option>Wig coloring</option>
            </select>

            <label for="u_message">Message</label>
            <textarea id="u_message" name="u_message" rows="4"></textarea>

            <button type="submit" class="btn">Submit Request</button>
        </form>
    </section>
</main>

<hr>

<footer>
    <table>
        <tr>
            <td>2026 Ney's Hair &amp; Beauty</td>
        </tr>
    </table>
</footer>

</body>
</html>
